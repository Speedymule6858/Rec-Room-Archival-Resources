<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rec Room Archival Resources</title>
    <style>
        body { font-family: Arial, sans-serif; }
        header { background-color: #4CAF50; color: white; text-align: center; padding: 1em; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1em; padding: 2em; }
        .card { border: 1px solid #ccc; border-radius: 5px; padding: 1em; text-align: center; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgb(0,0,0); background-color: rgba(0,0,0,0.4); padding-top: 60px; }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 80%; }
    </style>
</head>
<body>
    <header>
        <h1>Rec Room Archival Resources</h1>
    </header>
    <div class="grid-container">
        <div class="card">
            <h2>Server 1</h2>
            <p>Description of Server 1</p>
            <button onclick="openModal()">More Info</button>
        </div>
        <div class="card">
            <h2>Server 2</h2>
            <p>Description of Server 2</p>
            <button onclick="openModal()">More Info</button>
        </div>
        <!-- Add more server cards as needed -->
    </div>
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="cursor:pointer; float:right;">&times;</span>
            <h2>Server Details</h2>
            <p>More information about the server...</p>
        </div>
    </div>
    <script>
        function openModal() {
            document.getElementById('myModal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }
    </script>
</body>
</html>
